<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>古蔺平行小城</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:"PingFang SC","Microsoft YaHei",sans-serif}
#map{width:100%;height:100%}
#header{position:fixed;top:0;left:0;right:0;z-index:1000;background:linear-gradient(180deg,rgba(26,26,46,0.95) 0%,rgba(26,26,46,0) 100%);padding:12px 16px 20px;pointer-events:none}
#header h1{color:#f0c27a;font-size:18px;font-weight:bold;text-shadow:0 1px 4px rgba(0,0,0,0.5)}
#header p{color:#ccc;font-size:11px;margin-top:2px}
#player{position:fixed;z-index:500;pointer-events:none;font-size:24px;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.5));display:none}
#controls{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:1000;display:flex;gap:8px;background:rgba(0,0,0,0.5);backdrop-filter:blur(10px);padding:8px 12px;border-radius:20px}
#controls button{background:rgba(255,255,255,0.15);border:none;color:#fff;width:40px;height:40px;border-radius:20px;font-size:18px;cursor:pointer;touch-action:none}
#controls button:active{background:rgba(240,194,122,0.3)}
#controls .info-btn{background:rgba(240,194,122,0.2);width:auto;padding:0 16px;font-size:12px;color:#f0c27a}
#popup{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:1000;background:rgba(0,0,0,0.8);backdrop-filter:blur(10px);color:#fff;padding:10px 20px;border-radius:12px;font-size:13px;text-align:center;display:none;max-width:80%;pointer-events:none}
#popup .name{color:#f0c27a;font-weight:bold;font-size:15px}
#popup .sub{color:#aaa;font-size:11px;margin-top:2px}
.custom-marker{background:#f0c27a;border:2px solid #fff;border-radius:50%;width:12px;height:12px;box-shadow:0 2px 6px rgba(0,0,0,0.3)}
.custom-marker.highlight{background:#ff6b6b;width:16px;height:16px;animation:pulse 2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,107,107,0.7)}70%{box-shadow:0 0 0 10px rgba(255,107,107,0)}100%{box-shadow:0 0 0 0 rgba(255,107,107,0)}}
</style>
</head>
<body>
<div id="map"></div>
<div id="header">
  <h1>🏘️ 古蔺平行小城</h1>
  <p>四川省泸州市古蔺县 · 地图数据 © OpenStreetMap 贡献者</p>
</div>
<div id="player">🚗</div>
<div id="popup"></div>
<div id="controls">
  <button id="btnGoto">📍</button>
  <button id="btnLandmark">🏛️</button>
  <button class="info-btn" id="btnInfo">已加载</button>
  <button id="btnPlus">＋</button>
  <button id="btnMinus">－</button>
</div>
<script>
// 古蔺县中心
const center = [27.967, 105.931];
const zoom = 13;

// 初始化地图
const map = L.map('map', {
  center: center,
  zoom: zoom,
  zoomControl: false,
  attributionControl: false
});

// 使用CartoDB免费底图（比OSM默认好看）
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 19,
  minZoom: 10
}).addTo(map);

// 添加古蔺县边界（从OSM数据提取的简化边界）
// 实际开发中从OSM拉取真实边界
const gulinBounds = L.polygon([
  [28.12, 105.75],
  [28.10, 106.05],
  [27.85, 106.08],
  [27.90, 105.78]
], {
  color: '#f0c27a',
  weight: 2,
  fill: true,
  fillColor: '#f0c27a',
  fillOpacity: 0.05,
  dashArray: '5,5'
}).addTo(map);

// 关键地标数据
const landmarks = [
  { name: '古蔺县人民政府', pos: [27.940, 105.812], type: 'government', desc: '县城中心' },
  { name: '古蔺新体育中心', pos: [27.948, 105.808], type: 'sports', desc: '西区新城' },
  { name: '天立酒街', pos: [27.938, 105.815], type: 'wine', desc: '酱酒文化街区' },
  { name: '太平渡', pos: [28.068, 105.942], type: 'red', desc: '红军四渡赤水纪念地' },
  { name: '二郎镇', pos: [28.038, 106.018], type: 'wine', desc: '酱酒名镇' },
  { name: '黄荆老林', pos: [28.080, 105.783], type: 'nature', desc: '原始森林景区' },
  { name: '兴隆公园', pos: [27.935, 105.805], type: 'park', desc: '市民休闲公园' },
  { name: '古蔺汽车站', pos: [27.938, 105.820], type: 'transport', desc: '县城客运中心' },
  { name: '茅溪镇', pos: [27.930, 106.068], type: 'wine', desc: '酱酒仓储物流基地' },
  { name: '红军街', pos: [28.040, 106.020], type: 'red', desc: '二郎镇红色街区' }
];

// 地标图标映射
const iconMap = {
  government: '🏛️', sports: '🏟️', wine: '🍶', red: '⭐',
  nature: '🌲', park: '🌳', transport: '🚌'
};

const colorMap = {
  government: '#f0c27a', sports: '#4ecdc4', wine: '#ff6b6b',
  red: '#ff4757', nature: '#2ed573', park: '#7bed9f', transport: '#70a1ff'
};

// 添加地标标记
const markers = [];
landmarks.forEach(lm => {
  const marker = L.circleMarker(lm.pos, {
    radius: 8,
    fillColor: colorMap[lm.type] || '#f0c27a',
    color: '#fff',
    weight: 2,
    opacity: 1,
    fillOpacity: 0.9
  }).addTo(map);
  
  marker.bindTooltip(`${iconMap[lm.type] || '📍'} ${lm.name}`, {
    direction: 'top',
    offset: [0, -8]
  });
  
  marker.on('click', () => {
    showPopup(lm);
  });
  
  markers.push(marker);
});

// 弹出信息
function showPopup(lm) {
  const popup = document.getElementById('popup');
  popup.innerHTML = `
    <div class="name">${iconMap[lm.type] || '📍'} ${lm.name}</div>
    <div class="sub">${lm.desc}</div>
  `;
  popup.style.display = 'block';
  setTimeout(() => { popup.style.display = 'none'; }, 3000);
}

// 玩家定位
let playerPos = center;
let playerMarker = null;

function updatePlayer() {
  if (playerMarker) map.removeLayer(playerMarker);
  playerMarker = L.circleMarker(playerPos, {
    radius: 10,
    fillColor: '#ffd700',
    color: '#fff',
    weight: 3,
    fillOpacity: 0.9
  }).addTo(map);
  playerMarker.bindTooltip('🚗 你在这里', { direction: 'top' });
}

// 显示地图已加载
document.getElementById('btnInfo').textContent = `✅ 加载完成`;

// 控件事件
document.getElementById('btnGoto').addEventListener('click', () => {
  // 模拟定位到县城中心
  playerPos = [center[0] + (Math.random()-0.5)*0.02, center[1] + (Math.random()-0.5)*0.02];
  updatePlayer();
  map.flyTo(playerPos, 15);
});

document.getElementById('btnLandmark').addEventListener('click', () => {
  // 随机跳转到一个地标
  const lm = landmarks[Math.floor(Math.random() * landmarks.length)];
  map.flyTo(lm.pos, 16);
  setTimeout(() => showPopup(lm), 1000);
});

document.getElementById('btnPlus').addEventListener('click', () => {
  map.zoomIn();
});

document.getElementById('btnMinus').addEventListener('click', () => {
  map.zoomOut();
});

// 键盘
window.addEventListener('keydown', (e) => {
  if (e.key === '+' || e.key === '=') map.zoomIn();
  if (e.key === '-') map.zoomOut();
  if (e.key === 'g') document.getElementById('btnGoto').click();
  if (e.key === 'l') document.getElementById('btnLandmark').click();
});

// 初始化
updatePlayer();
</script>
</body>
</html>
